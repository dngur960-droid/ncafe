services:
  backend:
    image: ${BACKEND_IMAGE:-ncafe-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: woohyuk-backend
    expose:
      - "8029"
    volumes:
      - ./backend/upload:/app/upload
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8029
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/ncafedb}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-ncafe}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-new_ibm2}
      - JWT_SECRET=${JWT_SECRET:-woohyuk_ncafe_backend_jwt_secret_key_needs_to_be_at_least_32_bytes_long}
    restart: unless-stopped
    depends_on:
      - db

  local-proxy:
    image: nginx:alpine
    container_name: woohyuk-local-proxy
    ports:
      - "${FRONTEND_PORT:-3029}:80"
      - "${BACKEND_PORT:-8029}:81"
    volumes:
      - ./local-proxy.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ncafe-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: woohyuk-frontend
    expose:
      - "3001"
    environment:
      - API_BASE_URL=http://backend:8029
      - SESSION_SECRET=${SESSION_SECRET:-woohyuk_ncafe_secret_key_32_chars_long!!}
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: woohyuk-db
    environment:
      POSTGRES_DB: ncafedb
      POSTGRES_USER: ncafe
      POSTGRES_PASSWORD: ${DB_PASSWORD:-new_ibm2}
    ports:
      - "5429:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
    name: woohyuk-db-data
