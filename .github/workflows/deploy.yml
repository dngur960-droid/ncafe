name: Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-woohyuk_ncafe}" > .env
          echo "USER_ID=${USER_ID:-woohyuk}" >> .env
          echo "BACKEND_PORT=${BACKEND_PORT:-8029}" >> .env
          echo "FRONTEND_PORT=${FRONTEND_PORT:-3029}" >> .env
          echo "DB_PORT=${DB_PORT:-5429}" >> .env
          echo "SESSION_SECRET=${SESSION_SECRET:-woohyuk_ncafe_secret_key_32_chars_long!!}" >> .env
          echo "JWT_SECRET=${JWT_SECRET:-woohyuk_ncafe_backend_jwt_secret_key_needs_to_be_at_least_32_bytes_long}" >> .env
          mkdir -p ai-agent
          echo "GEMINI_API_KEY=${GEMINI_API_KEY:-}" > ai-agent/.env
        env:
          COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME }}
          USER_ID: ${{ secrets.USER_ID }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build and Deploy
        run: docker compose --profile with-db up --build -d

      - name: Verify deployment
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo "=== Initialize DB Schema ==="
          docker exec -i woohyuk-db psql -U ncafe -d ncafedb < db/init.sql || echo "DB init already done or skipped"
          echo "=== Restart Backend for Data Initialization ==="
          docker compose restart backend
          sleep 10
          docker logs woohyuk-backend --tail 50
          echo "=== Database Users ==="
          docker exec woohyuk-db psql -U ncafe -d ncafedb -c "SELECT * FROM users;" || echo "Failed to query DB"
          echo ""
          echo "=== Health Check ==="
          curl -sf --max-time 10 -o /dev/null -w "Backend  : HTTP %{http_code}\n" http://localhost:${BACKEND_PORT:-8029} || echo "Backend  : not responding"
          curl -sf --max-time 10 -o /dev/null -w "Frontend : HTTP %{http_code}\n" http://localhost:${FRONTEND_PORT:-3029} || echo "Frontend : not responding"
        env:
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}

      - name: Clean up old images
        run: docker image prune -f
