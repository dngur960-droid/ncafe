name: Deploy NCafe

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Backend with Gradle
      working-directory: ./backend
      run: |
        chmod +x gradlew
        ./gradlew build -x test

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ncafe-backend:latest ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/ncafe-backend:latest

    - name: Build and Push Docker Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ncafe-frontend:latest ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/ncafe-frontend:latest

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        envs: DATABASE_URL,DB_PASSWORD,JWT_SECRET,SESSION_SECRET,GEMINI_API_KEY,API_BASE_URL,BACKEND_IMAGE,BACKEND_PORT,COMPOSE_PROJECT_NAME,DB_PORT,FRONTEND_IMAGE,FRONTEND_PORT,JWT_EXPIRATION,USER_ID
        script: |
          cd ~/workspace/ncafe
          git pull origin master
          
          # .env 파일 생성 (Secrets + Variables 합치기)
          echo "SPRING_DATASOURCE_URL=$DATABASE_URL" > .env
          echo "SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD" >> .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "SESSION_SECRET=$SESSION_SECRET" >> .env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
          
          echo "API_BASE_URL=$API_BASE_URL" >> .env
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> .env
          echo "BACKEND_PORT=$BACKEND_PORT" >> .env
          echo "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME" >> .env
          echo "DB_PORT=$DB_PORT" >> .env
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> .env
          echo "FRONTEND_PORT=$FRONTEND_PORT" >> .env
          echo "JWT_EXPIRATION=$JWT_EXPIRATION" >> .env
          echo "USER_ID=$USER_ID" >> .env
          
          docker compose pull
          docker compose up -d
          docker image prune -f
